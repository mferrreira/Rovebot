app = "rovebot"
primary_region = "iad"

[build]

[env]
  ROVEBOT_GMAIL_POLLING = "true"
  ROVEBOT_POLLING_INTERVAL_SECONDS = "30"
  ROVEBOT_HISTORY_ID_FILE = "/data/last_history_id.txt"
  ROVEBOT_DRAFT_STORE_FILE = "/data/drafts_store.json"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "rovebot_data"
  destination = "/data"
